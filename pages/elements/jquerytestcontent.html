<div class="header1">
	<h1>The JQuery Test!</h1>
</div>

<div class="maintext">
	<script>
		$(document).ready(function () {
			$("#button1").click(function () {
				$("#test1").toggle(400);
				if (document.getElementById("button1").textContent == "Goodbye text!")
					document.getElementById("button1").textContent = "Hello text!";
				else document.getElementById("button1").textContent = "Goodbye text!";
			});
		});
	</script>
	<button id="button1">Goodbye text!</button>
	<p id="test1">Nooo!!!</p>
</div>
