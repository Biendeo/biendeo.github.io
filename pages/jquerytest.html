<!DOCTYPE html>
<title>The Biendeo Show</title>
<html>

<head>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
	<script type="text/javascript" src="/scripts/baseurlgetter.js"></script>
	<script type="text/javascript">
		$(document).ready(function () {
			$(".navigation").load("pages/elements/navigation.html");
		});
	</script>

	<link href="main.css" rel="stylesheet">
	<link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>
	<div class="navigation"></div>

	<div class="mainarea">
		<div class="header1">
			<h1>The JQuery Test!</h1>
		</div>

		<div class="maintext">
			<script>
				$(document).ready(function () {
					$("#button1").click(function () {
						$("#test1").toggle(400);
						if (document.getElementById("button1").textContent == "Goodbye text!")
							document.getElementById("button1").textContent = "Hello text!";
						else document.getElementById("button1").textContent = "Goodbye text!";
					});
				});
			</script>
			<button id="button1">Goodbye text!</button>
			<p id="test1">Nooo!!!</p>
		</div>
	</div>

	<script type="text/javascript" src="/scripts/footer.js"></script>
</body>
</html>
